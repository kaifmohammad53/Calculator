<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/Calculator/stylesheet.css">
</head>
<body>
    <h1>Calculator</h1>
    <div class="container">
        <div class="mode">
            <p>Light Mode</p>
        </div>
        <div class="resltSpace">
            
        </div>
        <div class="keySpace">
            <div class="kr1">]
                <button>AC</button>
                <button>+/-</button>
                <button>-></button>
                <button>/</button>
            </div>
            <div class="kr2">]
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>x</button>
            </div>
            <div class="kr3">]
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>-</button>
            </div>
            <div class="kr4">]
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>+</button>
            </div>
            <div class="kr5">]
                <button>0</button>
                <button>.</button>
                <button>=</button>
            </div>
        </div>
    </div>
    <script src="/Calculator/script.js"></script>
</body>
</html>
